services:
  web-frontend-node-prod:
    build:
      context: ../..
      dockerfile: deploy/Dockerfile.web
      args:
        FASTAPI_PROXY_TARGET: ${INTERNAL_API_URL:-http://metis-production-api:8000}
    container_name: web-frontend-node-prod
    ports:
      - "${HOST_PORT:-3080}:3000"
    environment:
      METIS_ENV: ${METIS_ENV:-production}
      FASTAPI_PROXY_TARGET: ${INTERNAL_API_URL:-http://metis-production-api:8000}
      NEXT_PUBLIC_SITE_URL: ${NEXT_PUBLIC_SITE_URL:-https://metis.gold}
      REFLASH_LOG_PATH: ${REFLASH_LOG_PATH:-/app/site/logs/reflash_daemon.log}
    volumes:
      - metis-telemetry-logs:/app/site/logs:ro
    networks:
      - metis-production-bridge

  metis-persistent-ingress-worker:
    build:
      context: ../..
      dockerfile: ingress_worker/Dockerfile
    container_name: metis-persistent-ingress-worker
    ports:
      - "${INGRESS_WORKER_HOST_PORT:-8000}:8000"
    environment:
      INGESTION_BEARER_TOKEN: ${INGESTION_BEARER_TOKEN:-metis_live_7f8c1a9d3b2e4560a7b8c9d0e1f2a3b4}
      LOG_LEVEL: ${LOG_LEVEL:-INFO}
      METIS_JOBS_DATA_ROOT: /data/jobs
      PORT: 8000
      METIS_TCP_NODELAY: 1
      METIS_SO_KEEPALIVE: 1
    volumes:
      - metis-ingress-jobs:/data/jobs
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/health', timeout=5)\""]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s
    networks:
      - metis-production-bridge

networks:
  metis-production-bridge:
    external: true

volumes:
  metis-telemetry-logs:
    external: true
  metis-ingress-jobs:
    external: true
